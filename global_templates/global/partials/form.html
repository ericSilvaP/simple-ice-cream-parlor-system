<div class="main-user-form">
  <form action="{{ form_action }}"
        method="POST"
        enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-content-grid">
      {% for field in form %}
        <div class="form-group {{ field.field.widget.attrs.class }} {% if field.name == 'cover' %}cover{% endif %} ">
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {{ field.errors }}
        </div>
        {% if field.name == 'cover' and field.value.url %}
          <div>
            <img src="{{ field.value.url }}" alt="">
          </div>
        {% endif %}
      {% endfor %}
      {% if form.non_field_errors %}
        <div class="form-errors center">
          <div>ERRO</div>
          {{ form.non_field_errors }}
        </div>
      {% endif %}
    </div>
    <div class="form-submit-btt-container container-center">
      <button class="main-btt">{{ submit_button_text|default:"Enviar" }}</button>
    </div>
  </form>
</div>
